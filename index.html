<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Still Life</title>

<style>
body {
  margin: 0;
  background: #e4573d;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ================= RESPONSIVE WRAPPER ================= */

.wrapper {
  width: 90vw;               /* scales with screen width */
  max-width: 1400px;         /* prevents huge stretching */
  aspect-ratio: 1100 / 750;  /* keeps original proportions */
  position: relative;
}

/* ================= SCENE (100% OF WRAPPER) ================= */

.scene {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* ================= COMPUTER ================= */

.computer {
  position: absolute;
  left: 36%;
  top: 16%;
  width: 31%;
  height: 48%;
  background: linear-gradient(#d8d2c8, #bfb8ae);
  border-radius: 2%;
}

.screen {
  position: absolute;
  top: 10%;
  left: 10%;
  width: 80%;
  height: 50%;
  background: radial-gradient(circle at 50% 30%, #2b2b2b, #000);
  border-radius: 5%;
  animation: screenGlow 4s ease-in-out infinite;
}

@keyframes screenGlow {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.15); }
}

.slot {
  position: absolute;
  bottom: 25%;
  left: 25%;
  width: 50%;
  height: 4%;
  background: #222;
  border-radius: 3px;
}

.keyboard {
  position: absolute;
  bottom: -18%;
  left: 5%;
  width: 90%;
  height: 20%;
  background: #c9c2b8;
  border-radius: 2%;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 3%;
  padding: 3%;
}

.key {
  background: #b5aea4;
  border-radius: 2px;
}

/* ================= SPHERE ================= */

.sphere {
  position: absolute;
  left: 8%;
  top: 52%;
  width: 22%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffffff, #d9d9d9);
}

/* ================= ORANGES ================= */

.orange {
  position: absolute;
  width: 12%;
  aspect-ratio: 1 / 1;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffcc66, #f57c00);
  background-size: 200% 200%;
  animation: lightShift 7s ease-in-out infinite;
}

.orange.top {
  top: 5%;
  left: 42%;
}

.orange.bottom {
  bottom: 12%;
  left: 40%;
}

@keyframes lightShift {
  0%   { background-position: 30% 30%; }
  50%  { background-position: 65% 65%; }
  100% { background-position: 30% 30%; }
}

.leaf {
  position: absolute;
  width: 40%;
  height: 22%;
  background: linear-gradient(to right, #4caf50, #2e7d32);
  border-radius: 50px 50px 0 50px;
  transform: rotate(-25deg);
  top: -15%;
  left: 30%;
}

/* ================= BOTTLE ================= */

.bottle {
  position: absolute;
  right: 8%;
  top: 30%;
  width: 15%;
  height: 55%;
  border-radius: 40% 40% 15% 15%;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.55),
    rgba(255,255,255,0.15)
  );
  border: 0.3vw solid rgba(255,255,255,0.3);
  overflow: hidden;
}

.bottle::before {
  content: "";
  position: absolute;
  top: -15%;
  left: 30%;
  width: 40%;
  height: 20%;
  border-radius: 20%;
  background: linear-gradient(#c49a6c, #8d6e63);
}

.bottle::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  animation: shine 6s infinite;
}

@keyframes shine {
  0% { left: -100%; }
  60% { left: 120%; }
  100% { left: 120%; }
}

</style>
</head>
<body>

<div class="wrapper">
  <div class="scene">

    <div class="sphere"></div>

    <div class="computer">
      <div class="screen"></div>
      <div class="slot"></div>

      <div class="keyboard">
        <!-- 48 keys -->
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>

        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>

        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>

        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
        <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      </div>
    </div>

    <div class="orange top"><div class="leaf"></div></div>
    <div class="orange bottom"><div class="leaf"></div></div>

    <div class="bottle"></div>

  </div>
</div>

</body>
</html>
